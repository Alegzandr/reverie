    <!-- Security headers (defense-in-depth). This app is 100% client-side: no
         backend, no network egress. `connect-src 'self'` enforces that promise,
         `object-src 'none'` blocks plugin vectors. `font-src` allows `data:` for
         the base64-embedded webfonts bundled by Vite. `'unsafe-inline'` is required
         for the two inline scripts below (GitHub Pages SPA redirect + JSON-LD) and
         Vite's injected styles; if those are ever hashed, tighten this to
         `'self' 'sha256-…'`. NB: `frame-ancestors` is intentionally omitted — it
         is ignored when delivered via <meta> and only works as an HTTP header. -->
    <meta http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; media-src 'self' blob:; font-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'none'" />

    <!-- GitHub Pages SPA Redirect Script -->
    <script>
      // Single Page Apps for GitHub Pages
      // https://github.com/rafgraph/spa-github-pages
      // This script checks to see if a redirect is present in the query string,
      // converts it back into the correct url and adds it to the
      // browser's history using window.history.replaceState(...),
      // which won't cause the browser to attempt to load the new url.
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
              l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>
