<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Reverie">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1C0F44" />
      <stop offset="1" stop-color="#46176E" />
    </linearGradient>
    <radialGradient id="halo" cx="0.5" cy="0.42" r="0.62">
      <stop offset="0" stop-color="#7C3AED" stop-opacity="0.55" />
      <stop offset="1" stop-color="#7C3AED" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="aurora" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#A78BFA" />
      <stop offset="0.5" stop-color="#F472B6" />
      <stop offset="1" stop-color="#38E0E8" />
    </linearGradient>
  </defs>

  <rect x="3" y="3" width="94" height="94" rx="22" fill="url(#bg)" />
  <rect x="3" y="3" width="94" height="94" rx="22" fill="url(#halo)" />

  <g transform="translate(-5,0)">
    <!-- soft glow underlay -->
    <path d="M20 52 C28 40,33 40,40 52 S52 64,60 52 S72 40,80 52"
          fill="none" stroke="url(#aurora)" stroke-width="18" stroke-linecap="round" opacity="0.18" />
    <!-- reverb ghost wave -->
    <path d="M21 61 C29 53,34 53,41 61 S53 69,61 61 S73 53,81 61"
          fill="none" stroke="url(#aurora)" stroke-width="6" stroke-linecap="round" opacity="0.45" />
    <!-- main wave -->
    <path d="M20 52 C28 40,33 40,40 52 S52 64,60 52 S72 40,80 52"
          fill="none" stroke="url(#aurora)" stroke-width="9" stroke-linecap="round" />
    <!-- end pulses -->
    <circle cx="20" cy="52" r="4.2" fill="#A78BFA" />
    <circle cx="80" cy="52" r="4.2" fill="#38E0E8" />
    <!-- radiating echo arcs (reverb / 8D) -->
    <path d="M85 46 Q90 52 85 58" fill="none" stroke="url(#aurora)" stroke-width="4" stroke-linecap="round" opacity="0.55" />
    <path d="M89 42 Q95 52 89 62" fill="none" stroke="url(#aurora)" stroke-width="3.5" stroke-linecap="round" opacity="0.3" />
  </g>
</svg>
