<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Reverie">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#160C36" />
      <stop offset="1" stop-color="#2A1A63" />
    </linearGradient>
    <radialGradient id="halo" cx="0.5" cy="0.34" r="0.66">
      <stop offset="0" stop-color="#5BC7E6" stop-opacity="0.45" />
      <stop offset="0.55" stop-color="#7C3AED" stop-opacity="0.22" />
      <stop offset="1" stop-color="#7C3AED" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="moon" cx="0.4" cy="0.36" r="0.75">
      <stop offset="0" stop-color="#F2FBFF" />
      <stop offset="0.55" stop-color="#CDEBFF" />
      <stop offset="1" stop-color="#9FD3F2" />
    </radialGradient>
    <linearGradient id="aurora" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#A78BFA" />
      <stop offset="0.5" stop-color="#58C8F0" />
      <stop offset="1" stop-color="#38E0E8" />
    </linearGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.2" />
    </filter>
  </defs>

  <rect x="3" y="3" width="94" height="94" rx="22" fill="url(#bg)" />
  <rect x="3" y="3" width="94" height="94" rx="22" fill="url(#halo)" />

  <!-- moon glow + disc -->
  <circle cx="50" cy="36" r="15" fill="#BfE6FF" opacity="0.45" filter="url(#soft)" />
  <circle cx="50" cy="36" r="13.5" fill="url(#moon)" />

  <!-- horizon -->
  <rect x="16" y="52.5" width="68" height="1.4" rx="0.7" fill="url(#aurora)" opacity="0.5" />

  <!-- rippled reflection: the moonglade as reverberating sound waves -->
  <g fill="none" stroke="url(#aurora)" stroke-linecap="round">
    <path d="M37 59 Q43 57.5 50 59 T63 59" stroke-width="2.6" opacity="0.9" />
    <path d="M40 65 Q45 63.6 50 65 T60 65" stroke-width="2.4" opacity="0.7" />
    <path d="M42.5 71 Q46.5 69.8 50 71 T57.5 71" stroke-width="2.2" opacity="0.52" />
    <path d="M44.5 77 Q47.5 76 50 77 T55.5 77" stroke-width="2" opacity="0.36" />
    <path d="M46.5 82.5 Q48.5 81.8 50 82.5 T53.5 82.5" stroke-width="1.8" opacity="0.24" />
  </g>

  <!-- a few stars in the night sky -->
  <circle cx="27" cy="25" r="1.5" fill="#CDEBFF" opacity="0.9" />
  <circle cx="73" cy="22" r="1.7" fill="#A78BFA" opacity="0.85" />
  <circle cx="68" cy="44" r="1.2" fill="#38E0E8" opacity="0.8" />
  <circle cx="31" cy="43" r="1.1" fill="#CDEBFF" opacity="0.7" />
</svg>
