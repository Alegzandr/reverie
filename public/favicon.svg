<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="PitchSongs">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B1020" />
      <stop offset="100%" stop-color="#141B2E" />
    </linearGradient>
    <linearGradient id="wave" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF8AA3" />
      <stop offset="100%" stop-color="#48C7EC" />
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="b" />
      <feMerge>
        <feMergeNode in="b" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect x="4" y="4" width="92" height="92" rx="22" fill="url(#bg)" />
  <rect x="8" y="8" width="84" height="84" rx="20" fill="#0F1526" opacity="0.65" />

  <path
    d="M15 60
       C 22 48, 30 48, 37 60
       S 52 78, 62 62
       S 78 38, 86 52"
    fill="none"
    stroke="url(#wave)"
    stroke-width="10"
    stroke-linecap="round"
    filter="url(#glow)"
  />
  <path
    d="M20 44
       C 28 32, 40 30, 50 42
       S 68 58, 80 38"
    fill="none"
    stroke="url(#wave)"
    stroke-width="6"
    stroke-linecap="round"
    opacity="0.7"
  />
</svg>
